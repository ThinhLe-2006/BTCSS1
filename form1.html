<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LAB Form</title>

<style>
body{
    font-family: Arial, sans-serif;
}

.mytextbox{
    color:#99FF33;
    background-color:#006699;
    border:1px solid #996633;
    width:300px;
    padding:5px;
}

#form1 table{
    border:5px groove #993366;
    background:#FFCCCC;
    color:#003399;
    margin:0 auto;
    border-collapse:collapse;
}

#form1 table td{
    border:1px solid #CC9999;
    padding:6px;
}
</style>

</head>

<body>

<form id="form1">

<table width="500" cellpadding="4" cellspacing="0">

<caption><b>ĐĂNG KÝ THÀNH VIÊN CLB YÊU NHẠC</b></caption>

<tr>
<td>Họ tên</td>
<td>
<input type="text" id="txtHoTen" class="mytextbox"
placeholder="Nhập họ tên" required>
</td>
</tr>

<tr>
<td>Tên đăng nhập</td>
<td>
<input type="text" id="txtUserName" class="mytextbox"
placeholder="Username" required>
</td>
</tr>

<tr>
<td>Mật khẩu</td>
<td>
<input type="password" id="txtPass" class="mytextbox"
required>
</td>
</tr>

<tr>
<td>Gõ lại mật khẩu</td>
<td>
<input type="password" id="txtRepass"
class="mytextbox" required>
</td>
</tr>

<tr>
<td>Phái</td>
<td>
<input type="radio" name="rdPhai" value="0"> Nam
<input type="radio" name="rdPhai" value="1"> Nữ
</td>
</tr>

<tr>
<td>Ngoại ngữ</td>
<td>
<input type="checkbox" id="chkAnh"> Anh

<input type="checkbox" id="chkPhap"> Pháp

<input type="checkbox" id="chkHoa"> Hoa
</td>
</tr>

<tr>
<td>Nghề nghiệp</td>
<td>

<select id="cboNgheNghiep" class="mytextbox">

<option value="0">Bạn làm nghề gì</option>

<option value="1">Học sinh - Sinh viên</option>

<option value="2">Giáo viên</option>

<option value="3">Nhân viên</option>

</select>

</td>
</tr>

<tr>
<td>Hình</td>
<td>
<input type="file" id="fHinh"
class="mytextbox">
</td>
</tr>

<tr>
<td>Sở thích</td>
<td>
<textarea id="txtSoThich"
class="mytextbox"
rows="4"></textarea>
</td>
</tr>

<tr>
<td colspan="2" align="center">

<input type="submit"
id="btnDangKy"
value="Đăng ký">

<input type="reset"
id="btnXoa"
value="Làm lại">

<input type="hidden"
name="NgayDangKy"
value="11/11/2011">

</td>
</tr>

</table>

</form>

</body>
</html>
