<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký thành viên CLB Yêu Nhạc</title>

<style>

body{
    font-family: Times New Roman;
    background:white;
}

#form1 table{
    width:500px;
    margin:20px auto;
    border-collapse:collapse;
    border:5px groove #993366;
    background:#FFCCCC;
    color:#003399;
}

#form1 caption{
    font-size:24px;
    color:#0033CC;
    font-weight:bold;
    padding:10px;
}

#form1 td{
    border:1px solid #CC9999;
    padding:6px;
}

#form1 td:first-child{
    width:150px;
    font-weight:bold;
}

.mytextbox{
    width:270px;
    background:#006699;
    color:#99FF33;
    border:1px solid #996633;
    padding:3px;
}

textarea.mytextbox{
    height:90px;
}

select.mytextbox{
    width:275px;
}

.button{
    padding:2px 10px;
}

.center{
    text-align:center;
}

</style>

</head>

<body>

<form id="form1">

<table>

<caption>ĐĂNG KÝ THÀNH VIÊN CLB YÊU NHẠC</caption>

<tr>
<td>Họ tên</td>
<td><input class="mytextbox" type="text" value="Nguyễn Văn Tèo"></td>
</tr>

<tr>
<td>Tên đăng nhập</td>
<td><input class="mytextbox" type="text" value="teonv"></td>
</tr>

<tr>
<td>Mật khẩu</td>
<td><input class="mytextbox" type="password" value="123456"></td>
</tr>

<tr>
<td>Gõ lại mật khẩu</td>
<td><input class="mytextbox" type="password" value="123456"></td>
</tr>

<tr>
<td>Phái</td>
<td>
<input type="radio" checked> Nam
<input type="radio"> Nữ
</td>
</tr>

<tr>
<td>Ngoại ngữ</td>
<td>
<input type="checkbox" checked> Anh
<input type="checkbox"> Pháp
<input type="checkbox"> Hoa
</td>
</tr>

<tr>
<td>Nghề nghiệp</td>
<td>

<select class="mytextbox">
<option selected>Học sinh-Sinh viên</option>
<option>Giáo viên</option>
<option>Nhân viên</option>
</select>

</td>
</tr>

<tr>
<td>Hình</td>
<td>
<input class="mytextbox" value="missonha.jpg">
<input type="file">
</td>
</tr>

<tr>
<td>Sở thích</td>
<td>

<textarea class="mytextbox">Ngắm trăng, uống trà, vuốt râu
nhìn mưa rơi, nghe chim hót, ngâm thơ</textarea>

</td>
</tr>

<tr>

<td colspan="2" class="center">

<input class="button" type="submit" value="Đăng ký">

<input class="button" type="reset" value="Làm lại">

</td>

</tr>

</table>

</form>

</body>
</html>
